<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body{
        margin:0;
        min-height:100vh;
        font-family:'Special Elite', monospace;

        background-image: url("sherlockIcon1.png"), url("sherlockIco2.png");
        background-size: 50% 100%;
        background-position: left top, right top;
        background-repeat: no-repeat;

        }
        .quiz-box{
        position:absolute;
        top:10%;    
        left:12.5%;      
        width: 75%;
        margin: 0;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        background:rgba(244,236,216,0.9);
        border:3px solid #5a4a2f;
        box-shadow:0 0 25px rgba(0,0,0,0.6);
        }

        button{
        margin-top: 15px;
        padding: 10px 20px;
        cursor: pointer;
        border: 1px solid #3371FF;
        background-color: white;
        color:black;
        font-weight:bold;
        }
        button:hover{
            background-color:#3371FF;
            color:white;
        }
        #question{
            font-size:24px;
            background:linear-gradient(#f8f1dc,#efe3c2);
            border:1px solid #6b5b3e;
            padding:20px;
            margin-bottom:20px;
            border-radius:5px;
            font-weight:bold;
            text-align:center;
            }
        .rating {
            display: flex;
            -ms-flex-align: center;
            gap: 5px;
        }

        .rating input {
            display: none;
}

        .rating label {
        padding: 8px 12px;
        border: 1px solid #333;
        cursor: pointer;
        background: #eee;
        border-radius: 5px;
        font-weight: bold;
        }
        .rating label:hover {
            cursor: pointer;
            color:white;
            background-color: black;
            }

        .rating input:checked + label {
        background: #4CAF50;
        color: white;
        }
        #sentence{
            color:darkred;
        }
        #progress{
            height:10px;
            background:#ccc;
            border-radius:5px;
            margin-bottom:15px;
            overflow:hidden;
}

        #progressBar{
            height:100%;
            width:0%;
            background:#3371FF;
            transition:width 0.3s;
        }
        #answers label{
            display:block;
            background:white;
            border:2px solid #333;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
}

            #answers label:hover{
                background:#e6e6e6;
                transform:scale(1.02);
}
            .correct{
                background:#4CAF50 !important;
                color:white;
                }

            .wrong{
                background:#e74c3c !important;
                color:white;
            }
            </style>
</head>
<body>
    <div class="quiz-box">
<div id="progress">
    <div id="progressBar"></div>
</div> 
<h4 id="counter"></h4>


<h2 id="question"></h2>

<div id="answers"></div>

<button onclick="nextQuestion()">Next</button>

<h3 id="result"></h3>
<h3 id="sentence"></h3>
<div class="rating" id="ratingBox" style="display:none;">
<h3>Rate this quiz:</h3>

<input type="radio" name="score" id="r0"><label for="r0">0</label>
<input type="radio" name="score" id="r1"><label for="r1">1</label>
<input type="radio" name="score" id="r2"><label for="r2">2</label>
<input type="radio" name="score" id="r3"><label for="r3">3</label>
<input type="radio" name="score" id="r4"><label for="r4">4</label>
<input type="radio" name="score" id="r5"><label for="r5">5</label>
<input type="radio" name="score" id="r6"><label for="r6">6</label>
<input type="radio" name="score" id="r7"><label for="r7">7</label>
<input type="radio" name="score" id="r8"><label for="r8">8</label>
<input type="radio" name="score" id="r9"><label for="r9">9</label>
<input type="radio" name="score" id="r10"><label for="r10">10</label>

</div>

</div>
<audio id="mysterySound" src="mysterysound.wav" loop></audio>

    <script>
        const quiz = [
            {
                question:"Which is the most popular novel by Arthur Conan Doyle featuring Sherlock Holmes?",
                answers:["The Hound of the Baskervilles","A Study in Scarlet","The Valley of Fear","The Sign of the Four"],
                correct:0

            },
            {
                question:"How did Sherlock Holmes deduce things about a person he had just met?",
                answers:["From the person's appearance","From the objects or clothes the person had or was wearing","From the way the person spoke","All of the above"],
                correct:3
            },
            {
                question:"Who is the only person who managed to outsmart Sherlock Holmes?",
                answers:["Professor Moriarty","Irene Adler","Dr.John Watson"],
                correct:1

            },
            {
                question:"Who is the permanent enemy of Sherlock Holmes?",
                answers:["Professor Moriarty","Charles Augustus Milverton","Irene Adler"],
                correct:0
            },
            {
                question:"What is the name of the short story in which Sherlock Holmes confronted Professor Moriarty and which temporarily marked the end of Sherlock Holmes?",
                answers:["The Adventure of the Empty House","His Last Bow","The Final Problem"],
                correct:2
            },
            {
                question:"Which of the following does not belong to the book The Adventures of Sherlock Holmes?",
                answers:["The Red-Headed League","A Scandal in Bohemia","The Adventure of the Norwood Builder","The Adventure of the Speckled Band"],
                correct:2

            },
            {
                question:"In which story does a snake appear in a case of Sherlock Holmes?",
                answers:["The Crooked Man","The Adventure of the Speckled Band","The Adventure of the Dying Detective","The Problem of Thor Bridge"],
                correct:1
            },
            {
                question:"Who is the beloved friend of Sherlock Holmes and at the same time his assistant?",
                answers:["Arthur Hastings","Hercule Poirot","Professor Moriarty","Dr. John Watson"],
                correct:3
            },
            {
                question:"In which story or adventure of Sherlock Holmes was the Black Pearl of the Borgias found?",
                answers:["The Adventure of the Six Napoleons","The Adventure of the Beryl Coronet","The Adventure of the Blue Carbuncle","The Musgrave Ritual"],
                correct:0
            },
            {
                question:"Which book contains short stories featuring Sherlock Holmes?",
                answers:["The Adventure of the Six The Adventures of Sherlock Holmes","The Memoirs of Sherlock Holmes","His Last Bow","All of the above"],
                correct:3
            },
            {
                question:"Which Sherlock Holmes short story involves the construction of a tunnel to rob a bank?",
                answers:["The Red-Headed League","The Stockbroker's Clerk","The Adventure of the Bruce-Partington Plans","Adventure of the Beryl Coronet"],
                correct:0

            }

        ];
        let trexwn=0;
        let score=0;
        document.body.addEventListener("click", function(){
        document.getElementById("mysterySound").play();
        }, {once:true});
        function showQuestion(){
            q = quiz[trexwn];
            document.getElementById("question").innerText=q.question;
            let apanthshsHtml="";
            q.answers.forEach((answer,index)=>{
                apanthshsHtml+= `
                <label>
                <input type="radio" name="answer" value="${index}">
                ${answer}
                </label><br>
                `;
                });
                let percent = (trexwn / quiz.length) * 100;
                document.getElementById("progressBar").style.width = percent + "%";
                document.getElementById("counter").innerText =
                `Question ${trexwn+1} / ${quiz.length}`;
                document.getElementById("answers").innerHTML= apanthshsHtml;
            }
            function nextQuestion(){

            let selected = document.querySelector('input[name="answer"]:checked');
            if(!selected){
                alert('Select one option');
            }
            if(parseInt(selected.value)===quiz[trexwn].correct){
                score++
            }
            let selectedIndex = parseInt(selected.value);
            let labels = document.querySelectorAll("#answers label");

            labels.forEach((label,index)=>{
            if(index === quiz[trexwn].correct){
            label.classList.add("correct");
            }
            
            if(index === selectedIndex && selectedIndex !== quiz[trexwn].correct){
            label.classList.add("wrong");
            }
            });         
            setTimeout(()=>{
            trexwn++
            if(trexwn<quiz.length){
                showQuestion();
            }
            else{
                document.getElementById("progressBar").style.width = "100%";
                document.getElementById("question").innerHTML=
                `<h2>Your score is : ${score}/${quiz.length}</h2>`
                document.getElementById("answers").innerHTML="";
                document.querySelector("button").style.display="none";
                document.getElementById("ratingBox").style.display="block";
                if(score<=3){
                    document.getElementById("sentence").innerHTML=`Detective Level: Beginner 🕵️‍♂️<br>
                            You are just starting your journey into the world of Sherlock Holmes.<br>
                            It might be time to read a few more cases! `
                }
                else if (score>=4 && score<=6){
                    document.getElementById("sentence").innerHTML=`Detective Level: Apprentice Detective 🕵️‍♂️<br>
                                    Good effort! You know several Sherlock Holmes stories,<br>
                                    but there are still many mysteries waiting for you. `

                }
                else if (score>6 && score<=9){
                    document.getElementById("sentence").innerHTML=`Detective Level: Skilled Detective 🕵️‍♂️<br>
                                    Your deduction skills are impressive! `
                }
                else{
                    document.getElementById("sentence").innerHTML=`Detective Level: Master Detective 🕵️‍♂️<br>
                                Outstanding! Your reasoning and observation skills<br>
                                            are worthy of Sherlock Holmes himself.`
                }
                
        }
        
        },1200)
    }
    showQuestion();
    </script>
    
</body>
</html>
